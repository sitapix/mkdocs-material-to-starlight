name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref so a fast push sequence does not
# spawn N parallel matrices.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['20', '22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (biome)
        run: npm run check:ci

      - name: Typecheck
        run: npm run typecheck

      - name: Knip (dead code)
        run: npm run knip

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack smoke (verify tarball would publish cleanly)
        # `npm pack --dry-run` lists what `npm publish` would ship, without
        # creating the tarball. We assert the bin entry is present so a
        # `bin` / `files` drift fails on every PR — instead of surfacing
        # only at release tag push.
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack.txt
          grep -q 'dist/interface/cli/bin.js' /tmp/pack.txt

      - name: Audit (production deps, moderate+)
        run: npm run audit:release
