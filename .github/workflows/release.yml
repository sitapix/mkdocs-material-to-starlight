name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

# Serialize releases so two tag pushes don't race on `npm publish`. Don't
# cancel in flight: an in-progress publish that gets cancelled mid-step can
# leave npm and the GitHub release out of sync.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Lint (biome)
        run: npm run check:ci

      - name: Typecheck
        run: npm run typecheck

      - name: Knip (dead code)
        run: npm run knip

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit (production deps, moderate+)
        run: npm run audit:release

      - name: Publish to npm
        # --ignore-scripts skips `prepublishOnly`, which would otherwise re-run
        # every gate above (typecheck, check:ci, knip, test, audit, build) for
        # the second time. The dedicated steps above are the source of truth
        # in CI; `prepublishOnly` is the local safety net for accidental
        # `npm publish` from a developer machine.
        run: npm publish --ignore-scripts --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
